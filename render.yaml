databases:
  - name: asistencia-db
    databaseName: asistencia_db
    user: asistencia_user
    plan: free

services:
  - type: web
    name: sistema-asistencia
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: asistencia-db
          property: connectionString
      - key: NODE_ENV
        value: production
