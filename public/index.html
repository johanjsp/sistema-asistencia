<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Sistema de registro de asistencia con autenticación biométrica">
    <link rel="manifest" href="/manifest.json">
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Asistencia">
    <link rel="apple-touch-icon" href="/img/icon-192x192.png">
    
    <title>Sistema de Asistencia - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="pwa-register.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="clock-container">
            <div id="clock" class="clock"></div>
            <div id="date" class="date"></div>
        </div>

        <div class="card">
            <div class="logo-container">
                <img src="img/logocolor.png" alt="Logo Sistema de Asistencia" class="logo">
            </div>
            <h1>Sistema de Asistencia</h1>
            <h2>Iniciar Sesión</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>

            <div class="register-link">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Actualizar reloj
        function actualizarReloj() {
            const ahora = new Date();
            let horas = ahora.getHours();
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            const segundos = String(ahora.getSeconds()).padStart(2, '0');
            
            const periodo = horas >= 12 ? 'PM' : 'AM';
            horas = horas % 12 || 12;
            const horasFormateadas = String(horas).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${horasFormateadas}:${minutos}:${segundos} ${periodo}`;
            
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = ahora.toLocaleDateString('es-ES', opciones);
        }

        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // Manejar login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar token y datos del usuario
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '¡Login exitoso! Redirigiendo...';
                    
                    // Redirigir según el rol
                    setTimeout(() => {
                        if (data.user.rol === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Error al iniciar sesión';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Error de conexión con el servidor';
            }
        });
    </script>
</body>
</html>
